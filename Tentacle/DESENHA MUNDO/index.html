<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Desenha Mundo</title>

  <!--
    =============================================
    DESENHA MUNDO — Sprint 1
    Arquivo: index.html
    Responsabilidade: estrutura e conteúdo da página
    =============================================
  -->

  <!-- Fonte arredondada e amigável, boa legibilidade infantil -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">

  <!-- Estilos separados -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Fundo estilo caderno (linhas + margem) -->
  <div class="fundo-papel" aria-hidden="true"></div>

  <!-- Nome do jogo fixo no topo -->
  <p class="logo-nome" aria-hidden="true">✏️ Desenha Mundo</p>

  <!-- =============================================
       BOTÃO DE MUDO
       Fixo no canto superior direito.
       Permite que a criança (ou responsável)
       silencie todos os sons com um clique.
       Importante para crianças sensíveis a som.
  ============================================== -->
  <button
    id="btnMudo"
    class="btn-mudo"
    aria-label="Desativar sons"
    title="Desativar sons"
  >
    🔊
  </button>

  <!-- =============================================
       APLICATIVO — contém as duas telas
  ============================================== -->
  <div id="app">

    <!-- ==========================================
         TELA 1: TELA INICIAL
         Personagem + balão de boas-vindas + botão
    =========================================== -->
    <section class="tela" id="tela-inicio" role="main" aria-label="Tela inicial do jogo">

      <!-- Personagem flutuando -->
      <div class="personagem-container" aria-hidden="true">
        <!--
          SVG do personagem "Pingo":
          bolinha sorridente segurando um lápis.
          Simples, sem muitos detalhes, amigável.
        -->
        <svg width="130" height="140" viewBox="0 0 130 140" fill="none"
             xmlns="http://www.w3.org/2000/svg" aria-label="Personagem Pingo">
          <!-- Corpo -->
          <circle cx="65" cy="72" r="48" fill="#FF8C6B" stroke="#E07050" stroke-width="3"/>
          <!-- Olho esquerdo -->
          <ellipse cx="50" cy="64" rx="7" ry="8" fill="#fff"/>
          <circle cx="51" cy="65" r="4" fill="#3A3530"/>
          <circle cx="53" cy="63" r="1.5" fill="#fff"/>
          <!-- Olho direito -->
          <ellipse cx="80" cy="64" rx="7" ry="8" fill="#fff"/>
          <circle cx="81" cy="65" r="4" fill="#3A3530"/>
          <circle cx="83" cy="63" r="1.5" fill="#fff"/>
          <!-- Sorriso -->
          <path d="M50 82 Q65 96 80 82" stroke="#3A3530" stroke-width="3" stroke-linecap="round" fill="none"/>
          <!-- Braço com lápis -->
          <line x1="110" y1="60" x2="95" y2="78" stroke="#E07050" stroke-width="6" stroke-linecap="round"/>
          <!-- Lápis -->
          <rect x="108" y="38" width="10" height="28" rx="2"
                fill="#F9D776" stroke="#E8C040" stroke-width="1.5"
                transform="rotate(30 108 38)"/>
          <polygon points="118,62 126,72 110,68" fill="#FFCBA0" stroke="#E07050" stroke-width="1"/>
          <line x1="115" y1="64" x2="122" y2="70" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
          <!-- Estrelinhas decorativas -->
          <text x="20" y="30" font-size="18" fill="#F9D776" opacity="0.8">✦</text>
          <text x="96" y="24" font-size="14" fill="#5BB8A0" opacity="0.9">✦</text>
          <text x="10" y="58" font-size="10" fill="#FF8C6B" opacity="0.7">✦</text>
        </svg>
      </div>

      <!-- Balão de fala com mensagem de boas-vindas -->
      <div class="balao" role="region" aria-label="Mensagem de boas-vindas">
        <p>
          Oi, amiguinho!
          <span class="destaque">Eu sou o Pingo! 🙂</span>
          <br><br>
          Nesse jogo, você vai me ajudar a
          chegar no fim do caminho
          <span class="destaque">desenhando</span>
          o que eu precisar.
          <br><br>
          Vamos começar juntos? 🎨
        </p>
      </div>

      <!-- Botão principal "Começar" -->
      <button
        class="btn-comecar"
        id="btnComecar"
        aria-label="Começar o jogo"
      >
        <span class="estrelinha" aria-hidden="true">⭐</span>
        Começar!
        <span class="estrelinha" aria-hidden="true">⭐</span>
      </button>

    </section>


    <!-- ==========================================
         TELA 2: INÍCIO DA JORNADA
         Exibida após a transição do botão
    =========================================== -->
    <section
      class="tela"
      id="tela-jornada"
      role="main"
      aria-label="Início da jornada"
      aria-hidden="true"
    >

      <!-- Cenário de fundo: colinas + sol nascendo -->
      <div class="cenario" aria-hidden="true">
        <svg class="colinas" viewBox="0 0 1440 220"
             preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Colina de trás (mais clara) -->
          <path d="M0 180 Q200 80 400 160 Q600 240 800 140 Q1000 60 1200 160 Q1350 220 1440 150 L1440 220 L0 220Z"
                fill="#C8EDE3" opacity="0.5"/>
          <!-- Colina da frente -->
          <path d="M0 210 Q180 140 360 190 Q540 240 720 180 Q900 120 1080 190 Q1260 240 1440 200 L1440 220 L0 220Z"
                fill="#A8DDD0"/>
          <!-- Sol nascendo -->
          <circle cx="720" cy="90" r="48" fill="#FDEEA3" opacity="0.7"/>
          <circle cx="720" cy="90" r="34" fill="#F9D776"/>
        </svg>
      </div>

      <!-- Conteúdo central da tela 2 -->
      <div class="jornada-conteudo">

        <!-- Personagem menor com animação de caminhar -->
        <div class="personagem-jornada" aria-hidden="true">
          <svg width="90" height="98" viewBox="0 0 130 140" fill="none"
               xmlns="http://www.w3.org/2000/svg">
            <circle cx="65" cy="72" r="48" fill="#FF8C6B" stroke="#E07050" stroke-width="3"/>
            <ellipse cx="50" cy="64" rx="7" ry="8" fill="#fff"/>
            <circle cx="51" cy="65" r="4" fill="#3A3530"/>
            <circle cx="53" cy="63" r="1.5" fill="#fff"/>
            <ellipse cx="80" cy="64" rx="7" ry="8" fill="#fff"/>
            <circle cx="81" cy="65" r="4" fill="#3A3530"/>
            <circle cx="83" cy="63" r="1.5" fill="#fff"/>
            <path d="M50 82 Q65 96 80 82" stroke="#3A3530" stroke-width="3"
                  stroke-linecap="round" fill="none"/>
          </svg>
        </div>

        <!-- Mensagem de início da jornada -->
        <h1 class="jornada-titulo">Vamos lá! 🌟</h1>

        <p class="jornada-subtitulo">
          A jornada está<br>começando agora!
        </p>

        <!-- Pontinhos animados representando o caminho -->
        <div class="caminho" aria-label="Caminho da jornada" role="img">
          <div class="ponto-caminho"></div>
          <div class="ponto-caminho"></div>
          <div class="ponto-caminho"></div>
          <div class="ponto-caminho"></div>
          <div class="ponto-caminho"></div>
        </div>

      </div>
    </section>

  </div><!-- /#app -->

  <!-- JavaScript separado — carregado ao final do body -->
  <script src="script.js"></script>

</body>
</html>
